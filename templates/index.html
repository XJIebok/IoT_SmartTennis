<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мониторинг умного теннисного корта</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{{ url_for('static', filename='js/index.js') }}" defer></script>
</head>
<body>
    <div class="top-controls">
        <button id="toggle_update" class="toggle-button">
            Автообновление: включено
        </button>

        <button id="toggle_auto_mode" class="toggle-button">
            Автоматический режим: выключен
        </button>
    </div>

<!--    <div id="auto_mode_result" class="auto-mode-result">-->
<!--        Автоматический режим не запущен-->
<!--    </div>-->
<!--    <div id="analysis_block" class="analysis-block">-->
<!--        <h3>Анализ данных</h3>-->
<!--    -->
<!--        <button id="analyze_data_btn" class="toggle-button">-->
<!--            Обновить анализ данных-->
<!--        </button>-->

<!--        <div id="analysis_result">-->
<!--            Данные анализа ещё не загружены-->
<!--        </div>-->
<!--    </div>-->
    <template id="thing_card_template">
        <div class="thing-card">
            <div class="thing-header">
                <div class="card-info">
                    <div><strong>ID:</strong> <span class="thing-id"></span></div>
                    <div><strong>NAME:</strong> <span class="thing-name"></span></div>
                </div>

                <div class="card-status">
                    <strong>STATUS:</strong>
                    <span class="thing-status"></span>
                </div>

                <button class="power-btn" aria-label="Включить/Выключить">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2v10M16.24 7.76a6 6 0 1 1-8.48 0" />
                    </svg>
                </button>
            </div>

            <div class="thing-details"></div>

            <div class="thing-controls"></div>
        </div>
    </template>
    <template id="speaker_controls_template">
        <div class="control-block">
            <h3>Управление звуковой системой</h3>

            <label>
                Тип сигнала:
                <select class="speaker-sound-type">
                    <option value="match_start">Начало матча</option>
                    <option value="set_end">Конец сета</option>
                    <option value="fault">Ошибка</option>
                    <option value="warning">Предупреждение</option>
                    <option value="!!!">!!!</option>
                    <option value="test">Тест ошибки</option>
                </select>
            </label>

            <label>
                Длительность сигнала, сек:
                <input class="speaker-duration" type="number" min="1" max="10" value="3">
            </label>

            <button class="speaker-play-btn">Подать сигнал</button>

            <hr>

            <label>
                Громкость:
                <input class="speaker-volume" type="number" min="0" max="100" value="70">
            </label>

            <button class="speaker-volume-btn">Изменить громкость</button>
        </div>
    </template>
    <template id="scoreboard_controls_template">
        <div class="control-block">
            <h3>Управление табло</h3>
            <label>
                Тип счёта:
                <select class="score-type">
                    <option value="points">Очки</option>
                    <option value="games">Геймы</option>
                    <option value="sets">Сеты</option>
                </select>
            </label>

            <label>
                Игрок 1:
                <input class="player1-score" type="number" min="0" value="0">
            </label>

            <label>
                Игрок 2:
                <input class="player2-score" type="number" min="0" value="0">
            </label>

            <button class="score-update-btn">Обновить счёт</button>

            <hr>

            <label>
                Статус матча:
                <select class="match-status">
                    <option value="not started">Не начат</option>
                    <option value="in progress">Идёт</option>
                    <option value="paused">Пауза</option>
                    <option value="finished">Завершён</option>
                </select>
            </label>

            <button class="match-status-btn">Изменить статус</button>
            <button class="score-reset-btn">Сбросить счёт</button>
        </div>
    </template>

    <div class="main-layout">
        <div class="left-panel">
            <div id="things_container"></div>
        </div>

        <div class="right-panel">
            <div id="auto_mode_result" class="auto-mode-result">
                Автоматический режим не запущен
            </div>

            <button id="analyze_data_btn" class="toggle-button">
                Обновить анализ данных
            </button>

            <div id="analysis_block" class="analysis-block">
                <h3>Анализ данных</h3>

                <div id="analysis_result">
                    Данные анализа ещё не загружены
                </div>
            </div>
        </div>
    </div>
</body>
</html>
